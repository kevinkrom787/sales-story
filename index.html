<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kevin Krom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080810;
    --surface: #0f0f18;
    --surface2: #15151f;
    --border: #1e1e2e;
    --border2: #2a2a3f;
    --text: #e8e8f0;
    --muted: #6a6a88;
    --subtle: #2a2a40;
    --mx: 50%;
    --my: 50%;
  }

  html { font-size: 15px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    min-height: 100vh;
    line-height: 1.5;
    overflow-x: hidden;
  }

  /* ── Grain overlay ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px 180px;
  }

  /* ── Mouse glow ── */
  .mouse-glow {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: radial-gradient(700px circle at var(--mx) var(--my), rgba(100, 60, 220, 0.06), transparent 50%);
  }

  /* ── Header ── */
  header {
    padding: 1.4rem 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }
  .header-name {
    display: flex;
    flex-direction: column;
    gap: 0.1rem;
  }
  .header-name span {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
  }
  .header-tagline {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }

  /* ── Stage Toggle ── */
  .stage-toggle {
    display: flex;
    gap: 0.3rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.25rem;
  }
  .stage-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: inherit;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.28rem 0.85rem;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .stage-btn:hover { color: var(--text); }
  .stage-btn.active { background: var(--surface2); color: var(--text); }

  /* ── View Bar ── */
  .view-bar {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.7rem 2.5rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.76rem;
    position: relative;
    z-index: 10;
  }
  .back-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.76rem;
    font-weight: 500;
    padding: 0;
    transition: color 0.15s;
  }
  .back-btn:hover { color: var(--text); }
  .view-bar-sep { color: var(--subtle); }
  .view-bar-current { font-weight: 700; }
  .stage-label-inline { margin-left: auto; font-size: 0.68rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }

  /* ── Card area ── */
  #card-area { position: relative; z-index: 2; min-height: calc(100vh - 58px); }

  /* ── HOME: typographic row list ── */
  .home-wrap {
    max-width: 920px;
    margin: 0 auto;
    padding: 0 2.5rem 4rem;
  }
  .home-intro {
    padding: 3rem 0 2.5rem;
    border-bottom: 1px solid var(--border);
  }
  .home-intro-title {
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    font-weight: 700;
    letter-spacing: -0.035em;
    line-height: 1.05;
    color: var(--text);
  }
  .home-intro-sub {
    margin-top: 1rem;
    font-size: 0.88rem;
    color: var(--muted);
    max-width: 460px;
    line-height: 1.7;
    font-weight: 400;
  }
  .home-row {
    display: flex;
    align-items: center;
    padding: 1.75rem 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    gap: 1.5rem;
    position: relative;
    overflow: hidden;
    transition: padding-left 0.2s ease;
  }
  .home-row::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, var(--row-glow, rgba(255,255,255,0)) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .home-row:hover { padding-left: 0.5rem; }
  .home-row:hover::after { opacity: 1; }
  .home-row-num {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--muted);
    width: 26px;
    flex-shrink: 0;
    transition: color 0.2s;
  }
  .home-row-content { flex: 1; }
  .home-row-name {
    font-size: clamp(1.5rem, 2.8vw, 2.2rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    transition: color 0.2s;
    line-height: 1.1;
  }
  .home-row-desc {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 0.3rem;
    max-width: 400px;
    line-height: 1.5;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.25s, transform 0.25s;
  }
  .home-row:hover .home-row-desc { opacity: 1; transform: translateY(0); }
  .home-row-chips {
    display: flex;
    gap: 0.35rem;
    flex-wrap: wrap;
    justify-content: flex-end;
    max-width: 260px;
  }
  .home-row-chip {
    font-size: 0.62rem;
    padding: 0.14rem 0.45rem;
    border-radius: 20px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    color: var(--muted);
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
  }
  .home-row-arrow {
    font-size: 1rem;
    color: var(--muted);
    flex-shrink: 0;
    transition: transform 0.2s, color 0.2s;
    width: 20px;
    text-align: right;
  }
  .home-row:hover .home-row-num    { color: var(--row-color); }
  .home-row:hover .home-row-name   { color: var(--row-color); }
  .home-row:hover .home-row-arrow  { transform: translateX(5px); color: var(--row-color); }
  .home-row:hover .home-row-chip   { color: var(--text); border-color: var(--border2); }

  /* ── Category hero ── */
  .cat-hero {
    padding: 2.5rem 2.5rem 2rem;
    border-bottom: 1px solid var(--border);
  }
  .cat-hero-eyebrow {
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 0.6rem;
  }
  .cat-hero-title {
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 700;
    letter-spacing: -0.035em;
    line-height: 1.05;
  }
  .cat-hero-desc {
    margin-top: 0.65rem;
    font-size: 0.83rem;
    color: var(--muted);
    max-width: 480px;
    line-height: 1.65;
  }

  /* ── Card grid (borderless mosaic) ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 0;
  }

  /* ── Card base ── */
  .card {
    background: var(--bg);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 1.75rem;
    cursor: pointer;
    transition: background 0.2s;
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 2px;
    height: 0;
    background: var(--card-accent, var(--muted));
    transition: height 0.3s ease;
  }
  .card:hover { background: var(--surface); }
  .card:hover::before { height: 100%; }

  .card:nth-child(1) { animation-delay: 0.04s; }
  .card:nth-child(2) { animation-delay: 0.08s; }
  .card:nth-child(3) { animation-delay: 0.12s; }
  .card:nth-child(4) { animation-delay: 0.16s; }
  .card:nth-child(5) { animation-delay: 0.20s; }
  .card:nth-child(6) { animation-delay: 0.23s; }
  .card:nth-child(7) { animation-delay: 0.26s; }

  .card-name    { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.015em; }
  .card-purpose { color: var(--muted); font-size: 0.8rem; line-height: 1.55; }
  .card-cta     { display: flex; justify-content: flex-end; margin-top: auto; padding-top: 0.5rem; }
  .card-cta span { font-size: 0.72rem; color: var(--muted); transition: color 0.2s; }
  .card:hover .card-cta span { color: var(--text); }

  /* ── Philosophy card ── */
  .phil-preview {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.65;
    font-style: italic;
  }

  /* ── Story carousel ── */
  .carousel-wrap {
    overflow-x: auto;
    display: flex;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: 2rem 2.5rem 3rem;
    gap: 1rem;
    cursor: grab;
    user-select: none;
  }
  .carousel-wrap::-webkit-scrollbar { display: none; }
  .carousel-wrap:active { cursor: grabbing; }
  .carousel-wrap .card {
    flex: 0 0 360px;
    min-height: 300px;
    scroll-snap-align: start;
    border: 1px solid var(--border);
    border-radius: 12px;
    animation: none;
  }

  /* ── Story card ── */
  .story-label {
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 700;
    padding: 0.12rem 0.45rem;
    border-radius: 999px;
    border: 1px solid;
    display: inline-block;
    width: fit-content;
  }
  .story-company {
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--text);
  }
  .story-teaser {
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: -0.005em;
    line-height: 1.5;
    color: var(--muted);
  }
  .story-context { font-size: 0.7rem; color: var(--muted); opacity: 0.7; }

  /* ── Playbook card extras ── */
  .card-metrics { display: flex; flex-direction: column; gap: 0.28rem; }
  .metric-pill {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.26rem 0.52rem;
    border-radius: 5px;
    font-size: 0.72rem;
  }
  .metric-pill-label { color: var(--muted); }
  .metric-pill-value { font-weight: 700; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 0.28rem; }
  .tag {
    font-size: 0.62rem;
    padding: 0.16rem 0.48rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--muted);
  }
  .tier-badge {
    position: absolute;
    top: 1.1rem; right: 1.1rem;
    font-size: 0.56rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 700;
    padding: 0.1rem 0.42rem;
    border-radius: 999px;
    border: 1px solid currentColor;
  }
  .tier-medium { opacity: 0.82; }
  .tier-low    { opacity: 0.52; }

  /* ── Right panel ── */
  .panel-backdrop {
    position: fixed;
    inset: 0;
    z-index: 200;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .panel-backdrop.open { opacity: 1; pointer-events: all; }
  .panel-scrim {
    position: absolute;
    inset: 0;
    background: rgba(4, 4, 10, 0.72);
    backdrop-filter: blur(3px);
  }
  .panel {
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: min(680px, 100vw);
    background: var(--surface);
    border-left: 1px solid var(--border2);
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .panel-backdrop.open .panel { transform: translateX(0); }

  .panel-header {
    padding: 2rem 2rem 1.25rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
  }
  .panel-close {
    position: absolute;
    top: 1.25rem; right: 1.25rem;
    background: none;
    border: 1px solid var(--border2);
    color: var(--muted);
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 0.8rem;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s, border-color 0.2s;
  }
  .panel-close:hover { color: var(--text); border-color: var(--muted); }
  .panel-title {
    font-size: 1.85rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
    padding-right: 2.5rem;
  }
  .panel-purpose {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 0.4rem;
    line-height: 1.55;
  }

  /* ── Panel tabs ── */
  .panel-tabs {
    display: flex;
    padding: 0 2rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .panel-tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-family: inherit;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 0.8rem 1rem;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--text); }

  /* ── Panel body ── */
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 2rem 2rem 3rem;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Principles: manifesto style ── */
  .principles-list { display: flex; flex-direction: column; }
  .principle-item {
    display: flex;
    gap: 2rem;
    padding: 2.2rem 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  .principle-item:last-child { border-bottom: none; }
  .principle-num {
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    width: 22px;
    flex-shrink: 0;
    padding-top: 0.65rem;
    opacity: 0.3;
  }
  .principle-text { font-size: 1rem; line-height: 1.6; flex: 1; }
  .principle-text strong {
    display: block;
    font-size: clamp(1.25rem, 2.4vw, 1.65rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text);
    margin-bottom: 0.45rem;
    line-height: 1.1;
  }
  .principle-body {
    color: var(--muted);
    font-size: 0.86rem;
    line-height: 1.7;
  }

  /* ── Prose ── */
  .prose-body { max-width: 520px; }
  .prose-para { font-size: 0.87rem; color: var(--muted); line-height: 1.85; margin-bottom: 1.1rem; }
  .prose-para:last-child { margin-bottom: 0; }

  /* ── Metrics tab ── */
  .metric-card { padding: 1rem 1.1rem; background: var(--surface2); border-radius: 8px; border: 1px solid var(--border); margin-bottom: 0.6rem; }
  .metric-card-header { display: flex; align-items: baseline; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.4rem; flex-wrap: wrap; }
  .metric-card-name { font-size: 0.88rem; font-weight: 700; }
  .metric-card-desc { font-size: 0.77rem; color: var(--muted); line-height: 1.5; margin-bottom: 0.45rem; }
  .metric-benchmark { font-size: 0.7rem; padding: 0.2rem 0.52rem; border-radius: 5px; display: inline-block; font-weight: 600; }

  /* ── Meetings tab ── */
  .meeting-row { padding: 1rem 0; border-bottom: 1px solid var(--border); }
  .meeting-row:last-child { border-bottom: none; }
  .meeting-row-top { display: flex; align-items: baseline; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.3rem; flex-wrap: wrap; }
  .meeting-name { font-size: 0.88rem; font-weight: 700; }
  .meeting-cadence { font-size: 0.66rem; padding: 0.14rem 0.48rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 999px; color: var(--muted); font-weight: 600; white-space: nowrap; }
  .meeting-attendees { font-size: 0.72rem; color: var(--muted); margin-bottom: 0.2rem; }
  .meeting-decisions { font-size: 0.75rem; color: var(--muted); line-height: 1.55; }

  /* ── Risks tab ── */
  .risk-card { padding: 0.9rem 1rem; background: var(--surface2); border-radius: 8px; border: 1px solid var(--border); border-left-width: 3px; margin-bottom: 0.6rem; }
  .risk-title { font-size: 0.85rem; font-weight: 700; margin-bottom: 0.3rem; }
  .risk-body { font-size: 0.76rem; color: var(--muted); line-height: 1.6; }

  /* ── Overview tab ── */
  .overview-stage-note { margin-top: 1rem; padding: 0.9rem 1rem; background: var(--surface2); border-radius: 8px; border-left: 3px solid var(--border); }
  .stage-note-label { font-size: 0.66rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.2rem; font-weight: 600; }
  .stage-note-tier { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.2rem; }
  .stage-note-body { font-size: 0.78rem; color: var(--muted); }
  .section-intro { font-size: 0.8rem; color: var(--muted); line-height: 1.6; margin-bottom: 1rem; }
  .sales-strategy { margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
  .sales-strategy h3 { font-size: 0.88rem; font-weight: 700; margin-bottom: 1rem; }
  .strategy-block { margin-bottom: 1rem; }
  .strategy-block h4 { font-size: 0.66rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.45rem; }
  .strategy-block p { font-size: 0.79rem; color: var(--muted); line-height: 1.6; }
  .segment-list { display: flex; flex-direction: column; gap: 0.35rem; }
  .segment-item { display: flex; flex-direction: column; gap: 0.07rem; padding: 0.5rem 0.7rem; background: var(--surface); border-radius: 6px; border: 1px solid var(--border); }
  .segment-label { font-size: 0.72rem; font-weight: 700; }
  .segment-desc { font-size: 0.71rem; color: var(--muted); }

  /* ── Steps tab ── */
  .steps-list { margin-top: 0.5rem; }
  .step-row { display: flex; gap: 0.75rem; margin-bottom: 0.5rem; align-items: flex-start; }
  .step-marker { min-width: 52px; text-align: center; padding: 0.17rem 0.3rem; border-radius: 5px; font-size: 0.64rem; font-weight: 700; letter-spacing: 0.04em; flex-shrink: 0; margin-top: 2px; }
  .step-action { font-size: 0.84rem; font-weight: 700; }
  .step-note { font-size: 0.75rem; color: var(--muted); line-height: 1.5; margin-top: 0.1rem; }

  /* ── Comparison table ── */
  .comparison-table { margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
  .comparison-table h3 { font-size: 0.8rem; font-weight: 700; margin-bottom: 0.7rem; }
  .comparison-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .comparison-col-header { font-size: 0.64rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.45rem; }
  .comparison-item { font-size: 0.76rem; color: var(--muted); padding: 0.24rem 0; border-bottom: 1px solid var(--border); line-height: 1.4; }
  .comparison-item:last-child { border-bottom: none; }

  /* ── Background split cards ── */
  .bg-split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 420px;
  }
  .bg-split-card {
    padding: 2.5rem;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: space-between;

<script>

const STAGE_LABELS = { early: 'Early Stage', growth: 'Growth Stage', scale: 'Scale Stage' };
const TIER_ORDER   = { 'critical': 0, 'very-high': 1, 'high': 2, 'medium': 3, 'low': 4 };
const TIER_LABELS  = { 'critical': 'Critical', 'very-high': 'Very High', 'high': 'High', 'medium': 'Medium', 'low': 'Low' };

let currentStage    = 'early';
let currentCategory = null;
let currentTab      = null;

// ── Mouse glow ──────────────────────────────────────────────────────────────

document.addEventListener('mousemove', e => {
  document.documentElement.style.setProperty('--mx', e.clientX + 'px');
  document.documentElement.style.setProperty('--my', e.clientY + 'px');
});


// ── Helpers ─────────────────────────────────────────────────────────────────

function tierClass(tier) {
  return { 'critical': 'tier-critical', 'very-high': 'tier-very-high', 'high': 'tier-high', 'medium': 'tier-medium' }[tier] || 'tier-low';
}

function getDefaultTabs() {
  return [
    { key: 'overview', label: 'Overview' },
    { key: 'metrics',  label: 'Metrics'  },
    { key: 'meetings', label: 'Meetings' },
    { key: 'risks',    label: 'Risks'    }
  ];
}

function findItem(id) {
  return GTM.find(f => f.id === id) || STORIES.find(s => s.id === id) || PHILOSOPHY.find(p => p.id === id) || BACKGROUND.find(b => b.id === id);
}

// ── Story carousel (infinite + drag) ────────────────────────────────────────

function initStoryCarousel(el) {
  // Clone cards to both ends for infinite wrap
  const originals = [...el.querySelectorAll('.card')];

  originals.forEach(card => {
    const clone = card.cloneNode(true);
    el.appendChild(clone);
    clone.addEventListener('click', () => openModal(clone.dataset.id));
  });
  ;[...originals].reverse().forEach(card => {
    const clone = card.cloneNode(true);
    el.prepend(clone);
    clone.addEventListener('click', () => openModal(clone.dataset.id));
  });

  // Start scrolled to the real (middle) set
  requestAnimationFrame(() => {
    el.scrollLeft = el.scrollWidth / 3;
  });

  // Silent jump when entering clone territory
  el.addEventListener('scroll', () => {
    const setW = el.scrollWidth / 3;
    if (el.scrollLeft < setW)        el.scrollLeft += setW;
    else if (el.scrollLeft >= setW * 2) el.scrollLeft -= setW;
  }, { passive: true });

  // Drag to scroll
  let isDown = false, startX, startScroll, moved = false;
  el.addEventListener('mousedown', e => {
    isDown = true; moved = false;
    startX = e.pageX - el.offsetLeft;
    startScroll = el.scrollLeft;
  });
  el.addEventListener('mouseleave', () => { isDown = false; });
  el.addEventListener('mouseup',    () => { isDown = false; });
  el.addEventListener('mousemove', e => {
    if (!isDown) return;
    e.preventDefault();
    const dx = (e.pageX - el.offsetLeft - startX) * 1.4;
    if (Math.abs(dx) > 4) moved = true;
    el.scrollLeft = startScroll - dx;
  });
  el.addEventListener('click', e => {
    if (moved) { e.stopPropagation(); moved = false; }
  }, true);
}

// ── Background sub-navigation ───────────────────────────────────────────────

function renderBackgroundMenu() {

          <div class="bg-split-label">The Human</div>

          </div>

          <div class="bg-split-label">The Career</div>

        </div>
        <div class="bg-split-bottom">
          <div class="bg-split-tags">
            <span>Stack Overflow</span>
            <span>Twitter</span>
            <span>CircleCI</span>
            <span>Unstructured</span>
          </div>
          <div class="bg-split-cta">Read →</div>
        </div>
      </div>
    </div>`;

  document.getElementById('bg-human').addEventListener('click', renderHuman);
  document.getElementById('bg-career').addEventListener('click', renderCareerList);
}

function renderHuman() {
  document.getElementById('view-bar-current').textContent = 'The Human';
  document.getElementById('back-btn').onclick = renderBackgroundMenu;
  document.getElementById('card-area').innerHTML = `
    <div class="human-section">
      <div class="human-photo-wrap">
        <img src="kevin.jpg" alt="Kevin Krom" class="human-photo">
      </div>
      <div class="human-text">
        <div class="human-eyebrow">The Human</div>
        <div class="human-body">
          <p>Husband to Lindsy. Dad to Jax and Quin. That's the most important job I'll ever have.</p>
          <p>City kid turned Colorado suburban cliché. I ski, bike, run, hike, camp. Mostly as an excuse to be outside with my boys while they grow up faster than I'd like.</p>
          <p>I build things. Not always useful things. Hardware, software, 3D printers, AI. If it can be taken apart, improved, or misunderstood first and figured out later, I'm in. Some things don't get put back together.</p>
          <p>I'm wired for curiosity and making. Great for startups. Problematic for everything else.</p>
          <p>There's always more to do. More to chase. AI doesn't wait. Neither do kids.</p>
          <p>I'm trying to get that tradeoff right. Some days I do. Some days I don't.</p>
          <p>At the end of the day, the goal is simple. Be present. Be a good father. Build things people love, with people I trust.</p>
        </div>
      </div>
    </div>`;
}

function renderCareerList() {

// ── Home ────────────────────────────────────────────────────────────────────

function renderHome() {

      }).join('')}

  area.querySelectorAll('.home-row').forEach(row => {
    row.addEventListener('click', () => enterCategory(row.dataset.id));

  // Trigger pretext-powered decode animation each time home renders

// ── Category view ────────────────────────────────────────────────────────────

function enterCategory(categoryId) {
  currentCategory = categoryId;
  const cat = CATEGORIES.find(c => c.id === categoryId);
  if (!cat) return;

  document.getElementById('view-bar').style.display = 'flex';
  document.getElementById('view-bar-current').textContent = cat.name;
  document.getElementById('view-bar-current').style.color = cat.accent;
  document.getElementById('back-btn').onclick = renderHome;

// ── Scramble on card/row title hover ─────────────────────────────────────────
const _sg = '!<>-_/[]=+*^?#@$%~|'.split('');

function _scramble(el) {
  if (el._sc) return;
  el._sc = true;
  const orig = el.textContent;
  const N = orig.length;
  const t0 = performance.now();
  const dur = 480;
  (function step(now) {
    const p    = Math.min((now - t0) / dur, 1);
    const ease = 1 - Math.pow(1 - p, 2.5);
    const piv  = Math.floor(ease * N);
    let html = '';
    for (let i = 0; i < N; i++) {
      if (i < piv) { html += orig[i]; continue; }
      const d = i - piv;
      html += d < 6
        ? `<span style="opacity:${(0.45 - d*.07).toFixed(2)};color:var(--muted)">${_sg[Math.random()*_sg.length|0]}</span>`
        : `<span style="opacity:0">${orig[i]}</span>`;
    }
    el.innerHTML = html;
    if (p < 1) requestAnimationFrame(step);
    else { el.textContent = orig; el._sc = false; }
  })(t0);
}

function _withFade(fn) {

      setTimeout(() => {
        a.style.transition = '';
        a.style.opacity    = '';
        a.style.transform  = '';

      }, 400);
    }));
  }, 140);
}

<!-- ── Pretext: decode animation for hero title ──────────────────────────────
     pretext (github.com/chenglou/pretext) measures multiline text layout
     without touching the DOM, so we can lock the container height before
     the scramble animation starts — zero layout shift guaranteed.
────────────────────────────────────────────────────────────────────────────-->
<script type="module">
import { prepare, layout } from 'https://esm.sh/@chenglou/pretext';

const _L1    = 'Sales. Deals.';
const _L2    = 'What actually works.';
const _GLYPH = '!<>-_/[]=+*^?#@$%~|'.split('');
const _rg    = () => _GLYPH[Math.random() * _GLYPH.length | 0];

async function animateHomeTitle() {
  const el = document.querySelector('.home-intro-title');
  if (!el) return;

  const computed = getComputedStyle(el);
  const fs   = parseFloat(computed.fontSize);
  const font = `${fs}px ${computed.fontFamily}`;  // e.g. "57px 'Space Grotesk', system-ui"
  const lh   = fs * 1.05;                         // matches CSS line-height: 1.05
  const cw   = el.parentElement.offsetWidth || 760;

  // ── Measure final text dimensions without any DOM layout reflow ───────────
  // pretext does the heavy lifting here: pure JS text metrics, no getBoundingClientRect
  const { height: h1 } = layout(prepare(_L1, font), cw, lh);
  const { height: h2 } = layout(prepare(_L2, font), cw, lh);

  // Lock height before we clear innerHTML — nothing below shifts during decode
  el.style.minHeight = Math.ceil(h1 + h2) + 'px';

  // ── Decode animation ───────────────────────────────────────────────────────
  const chars = (_L1 + '\n' + _L2).split('');
  const N     = chars.length;
  const t0    = performance.now();
  const DUR   = 2800;  // ms

  function step(now) {
    const prog  = Math.min((now - t0) / DUR, 1);
    const eased = 1 - Math.pow(1 - prog, 3);   // cubic ease-out: fast start
    const pivot = Math.floor(eased * N);

    let html = '';
    for (let i = 0; i < N; i++) {
      const c = chars[i];
      if (c === '\n') { html += '<br>'; continue; }
      if (i < pivot) {
        // Revealed character
        html += c;
      } else {
        const d = i - pivot;
        if (d < 10) {
          // Scramble "wave" — opacity fades with distance from reveal front
          const op = (0.48 - d * 0.044).toFixed(2);
          html += `<span class="decode-glyph" style="opacity:${op}">${_rg()}</span>`;
        } else {
          // Invisible placeholder keeps layout stable (this is the whole point)
          html += `<span style="opacity:0">${c}</span>`;
        }
      }
    }
    el.innerHTML = html;

    if (prog < 1) {
      requestAnimationFrame(step);
    } else {
      el.innerHTML = `${_L1}<br>${_L2}`;
      el.style.minHeight = '';
      _hookGlitch(el);
    }
  }

  requestAnimationFrame(step);
}

function _hookGlitch(el) {
  const snap = el.innerHTML;
  let tid;

  el.addEventListener('mouseenter', () => {
    let n = 0;
    tid = setInterval(() => {
      if (++n > 7) { clearInterval(tid); el.innerHTML = snap; return; }

      const kill = new Set();
      const total = _L1.length + _L2.length;
      while (kill.size < 2 + (Math.random() * 3 | 0)) {
        kill.add(Math.random() * total | 0);
      }

      let html = '', off = 0;
      for (const ch of _L1) {
        html += kill.has(off++) ? `<span class="decode-glyph" style="opacity:.6">${_rg()}</span>` : ch;
      }
      html += '<br>';
      for (const ch of _L2) {
        html += kill.has(off++) ? `<span class="decode-glyph" style="opacity:.6">${_rg()}</span>` : ch;
      }
      el.innerHTML = html;
    }, 55);
  });

  el.addEventListener('mouseleave', () => { clearInterval(tid); el.innerHTML = snap; });
}

// Expose so renderHome() can re-trigger on back-navigation
window.animateHomeTitle = animateHomeTitle;

// Initial run — ES modules are deferred, so renderHome() has already executed
animateHomeTitle();
</script>
